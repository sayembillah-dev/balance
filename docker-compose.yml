# Balance — self-host stack: Postgres + the app (API + SPA). See README for config.
#   cp .env.example .env   # optional
#   docker compose up -d   # → http://localhost:4000
services:
  db:
    image: postgres:16
    container_name: balance-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-balance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-balance}
      POSTGRES_DB: ${POSTGRES_DB:-balance}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-balance}"]
      interval: 5s
      retries: 12

  app:
    image: ghcr.io/sayembillah-dev/balance:latest
    build: .
    container_name: balance-app
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
    # Set here (not .env) so the in-container db host wins over any dev .env.
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-balance}:${POSTGRES_PASSWORD:-balance}@db:5432/${POSTGRES_DB:-balance}
      # Keep false on plain HTTP; set true once behind HTTPS / a TLS proxy.
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    env_file:
      - path: .env
        required: false
    ports:
      - "${APP_PORT:-4000}:4000"
    volumes:
      - appdata:/data

volumes:
  pgdata:
  appdata:
